# BEAM Mainnet Configuration
# Overrides for mainnet deployment

bittensor:
  network: "finney"
  netuid: 105

# Production-grade settings
orchestrator:
  min_worker_bandwidth_mbps: 10.0
  enable_geo_verification: true
  enable_latency_verification: true
  max_suspicious_score: 0.3

  # Standard epoch timing
  proof_aggregation_interval: 60

validator:
  epoch_length_seconds: 300
  bandwidth_challenge_size: 10485760  # 10 MB

client_tiers:
  basic:
    rate_limit_rpm: 30
    daily_transfer_bytes: 1073741824  # 1 GB
    max_concurrent: 2

  standard:
    rate_limit_rpm: 120
    daily_transfer_bytes: 10737418240  # 10 GB
    max_concurrent: 10

  premium:
    rate_limit_rpm: 600
    daily_transfer_bytes: 107374182400  # 100 GB
    max_concurrent: 50
