# BEAM Default Configuration
# These values are used unless overridden by environment variables or env-specific configs

# =============================================================================
# API Settings
# =============================================================================
api:
  host: "0.0.0.0"
  log_level: "INFO"

# =============================================================================
# Bittensor Settings
# =============================================================================
bittensor:
  network: "finney"
  netuid: 105
  wallet_name: "default"
  wallet_hotkey: "default"
  wallet_path: "~/.bittensor/wallets"

# =============================================================================
# Database Settings
# =============================================================================
database:
  pool_size: 10
  max_overflow: 20

# =============================================================================
# Redis Settings
# =============================================================================
redis:
  url: "redis://localhost:6379/0"

# =============================================================================
# Orchestrator Settings
# =============================================================================
orchestrator:
  port: 8000
  local_mode: false

  # Worker management
  max_workers: 10000
  worker_timeout_seconds: 300
  min_worker_bandwidth_mbps: 10.0
  worker_heartbeat_interval: 30

  # Task settings
  max_concurrent_tasks: 1000
  task_timeout_seconds: 120
  chunk_size_bytes: 1048576  # 1 MB

  # Proof aggregation
  proof_batch_size: 100
  proof_aggregation_interval: 60
  min_proofs_for_epoch: 10

  # Validator communication

  # Anti-fraud
  enable_geo_verification: true
  enable_latency_verification: true
  max_suspicious_score: 0.3

  # Worker scoring weights
  weights:
    trust: 0.30
    latency: 0.25
    load: 0.20
    bandwidth: 0.15
    success: 0.10

  # Reward distribution weights
  reward_weights:
    bytes: 0.50
    success_rate: 0.20
    latency: 0.15
    trust: 0.15

# =============================================================================
# Validator Settings
# =============================================================================
validator:
  port: 8001
  epoch_length_seconds: 300
  max_tasks_per_epoch: 100
  bandwidth_challenge_size: 10485760  # 10 MB

# =============================================================================
# Connection (Gateway) Settings
# =============================================================================
connection:
  port: 9000
  probation_tasks: 10
  ws_enabled: true

# =============================================================================
# Worker Settings
# =============================================================================
worker:
  relay_port: 9100
  max_concurrent_tasks: 10

# =============================================================================
# Client Tier Settings
# =============================================================================
client_tiers:
  basic:
    rate_limit_rpm: 30
    daily_transfer_bytes: 1073741824  # 1 GB
    max_concurrent: 2

  standard:
    rate_limit_rpm: 120
    daily_transfer_bytes: 10737418240  # 10 GB
    max_concurrent: 10

  premium:
    rate_limit_rpm: 600
    daily_transfer_bytes: 107374182400  # 100 GB
    max_concurrent: 50

# =============================================================================
# Cluster Settings (for federated deployment)
# =============================================================================
cluster:
  enabled: false
  heartbeat_interval: 30
  rebalance_threshold: 0.3
